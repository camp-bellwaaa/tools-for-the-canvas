<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PolyBridge</title>
    <!-- Memuat Tailwind CSS untuk styling bersih dan responsif -->
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* Menggunakan Font Inter */
        body {
            font-family: 'Inter', sans-serif;
            background-color: #0d1117; /* Latar belakang gelap seperti terminal/konsol */
            margin: 0;
            padding: 0;
            overflow: hidden; /* Mencegah scroll yang tidak perlu */
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            width: 100vw;
        }

        /* Styling spesifik untuk iframe agar memenuhi layar penuh */
        #gameFrame {
            width: 100%;
            height: 100%;
            border: none;
            display: block;
            background-color: #161b22; /* Warna latar sebelum game dimuat */
        }

        /* Styling loading screen */
        #loadingScreen {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: #0d1117;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 100;
            opacity: 1;
            transition: opacity 0.5s ease-out;
        }

        /* Animasi loading sederhana */
        .spinner {
            border: 4px solid rgba(255, 255, 255, 0.1);
            border-left-color: #4f46e5;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }
    </style>
</head>
<body>

    <!-- Layar Loading -->
    <div id="loadingScreen">
        <div class="spinner mb-4"></div>
        <p class="text-white text-lg font-medium">Loading...</p>
        <p class="text-gray-500 text-sm mt-1">Advanced Studies</p>
    </div>

    <!-- Iframe Game -->
    <iframe id="gameFrame" src="https//:www.polybridge2.com" frameborder="0" allowfullscreen></iframe>

    <script>
        const loadingScreen = document.getElementById('loadingScreen');
        const gameFrame = document.getElementById('gameFrame');
        
        // Fungsi untuk menyembunyikan layar loading setelah game dimuat
        gameFrame.onload = function() {
            // Memberikan sedikit penundaan untuk memastikan rendering selesai
            setTimeout(() => {
                loadingScreen.style.opacity = '0';
                setTimeout(() => {
                    loadingScreen.style.display = 'none';
                }, 500); // Harus sama dengan waktu transisi CSS
            }, 1000);
        };
        
        // Jika terjadi error saat memuat iframe (misal, diblokir), tampilkan pesan
        gameFrame.onerror = function() {
            loadingScreen.style.backgroundColor = '#991b1b'; // Merah gelap
            document.querySelector('#loadingScreen p').textContent = 'Good Luck.';
            document.querySelector('.spinner').style.display = 'none';
            loadingScreen.style.display = 'flex';
        };

        // Pastikan iframe selalu menyesuaikan ukuran viewport
        function resizeFrame() {
            gameFrame.style.width = window.innerWidth + 'px';
            gameFrame.style.height = window.innerHeight + 'px';
        }

        window.addEventListener('resize', resizeFrame);
        resizeFrame();
    </script>
</body>
</html>
